<!doctype html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
        <link rel="stylesheet" type="text/css" href="login.css" media="screen">
        <title>Cadastro</title>
    </head>
    <body class="body">  
        <div id="pop-up">
            <form>
                <fieldset class="grupo">
                    <div class="campo">
                        <label for="nome"><strong>Login</strong></label>
                        <input type="email" name="nome" id="nome">
                    </div>
                    <div class="campo">
                        <label for="sobrenome"><strong>Senha</strong></label>
                        <input type="password" name="sobrenome" id="sobrenome" >
                    </div>
                </fieldset> 
                <div id="button">
                    <input type="submit" value="Acessar" class="botao">          
                </div>
            </form>
        </div>
    </body>
</html>
